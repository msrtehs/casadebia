<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página não encontrada — Casa de Bia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='50' fill='%23C8445A'/><text x='50' y='62' text-anchor='middle' font-family='Georgia' font-size='42' fill='white' font-weight='700'>CB</text></svg>">
  <style>
    .err-page { min-height: 100vh; display: grid; place-items: center; padding: var(--space-5); background: linear-gradient(135deg, var(--rose-light) 0%, var(--gold-light) 100%); text-align: center; }
    .err-card { max-width: 520px; }
    .err-num { font-family: var(--font-display); font-size: clamp(5rem, 15vw, 9rem); font-weight: 700; line-height: 1; background: linear-gradient(135deg, var(--rose) 0%, var(--gold) 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: var(--space-4); }
    .err-card h1 { margin-bottom: var(--space-3); }
    .err-card p { color: var(--muted); font-size: var(--fs-md); margin-bottom: var(--space-6); }
    .err-actions { display: flex; gap: var(--space-3); justify-content: center; flex-wrap: wrap; }
  </style>
</head>
<body>
  <div class="err-page">
    <div class="err-card">
      <div class="err-num">404</div>
      <h1>Ops, página não encontrada</h1>
      <p>O endereço que você acessou não existe ou foi movido. Vamos voltar para começar de novo?</p>
      <div class="err-actions">
        <a href="index.html" class="btn btn-primary btn-lg"><i data-lucide="home"></i>Voltar para Home</a>
        <a href="simulador.html" class="btn btn-outline btn-lg"><i data-lucide="wand-2"></i>Montar evento</a>
      </div>
    </div>
  </div>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>document.addEventListener('DOMContentLoaded', () => { if (window.lucide) window.lucide.createIcons(); });</script>
</body>
</html>
