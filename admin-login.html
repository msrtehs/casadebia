<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin · Login — Casa de Bia</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/admin.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='50' fill='%23C8445A'/><text x='50' y='62' text-anchor='middle' font-family='Georgia' font-size='42' fill='white' font-weight='700'>CB</text></svg>">
</head>
<body class="admin-body">
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">CB</div>
      <h1>Painel Admin</h1>
      <p class="lead">Acesso restrito à proprietária</p>

      <form class="login-form" id="loginForm">
        <input type="email" id="loginEmail" placeholder="Email (apenas se Firebase ativo)" autocomplete="email" style="display:none;">
        <input type="password" id="loginPassword" placeholder="Digite sua senha" autocomplete="current-password" required autofocus>
        <div class="login-error" id="loginError">Senha incorreta. Tente novamente.</div>
        <button type="submit" class="btn btn-primary btn-lg">
          <i data-lucide="log-in"></i>Entrar
        </button>
      </form>

      <a href="index.html" class="back-link">
        <i data-lucide="arrow-left"></i>Voltar para o site
      </a>
    </div>
  </div>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="assets/js/firebase-config.js"></script>
  <script src="assets/js/data-store.js"></script>
  <script src="assets/js/firebase-store.js"></script>
  <script>
    if (window.DataStore.isLoggedIn()) {
      window.location.href = 'admin.html';
    }
    document.addEventListener('DOMContentLoaded', () => {
      if (window.lucide) window.lucide.createIcons();
      const form = document.getElementById('loginForm');
      const inpEmail = document.getElementById('loginEmail');
      const inp = document.getElementById('loginPassword');
      const err = document.getElementById('loginError');

      // Se Firebase está ativo, mostra campo de email
      if (window.FIREBASE_ENABLED) {
        inpEmail.style.display = '';
        inpEmail.required = true;
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        let ok;
        if (window.FIREBASE_ENABLED) {
          ok = await window.DataStore.loginWithEmail(inpEmail.value, inp.value);
        } else {
          ok = window.DataStore.login(inp.value);
        }
        if (ok) {
          window.location.href = 'admin.html';
        } else {
          err.classList.add('show');
          inp.value = '';
          (inpEmail.style.display === 'none' ? inp : inpEmail).focus();
        }
      });
      inp.addEventListener('input', () => err.classList.remove('show'));
      inpEmail.addEventListener('input', () => err.classList.remove('show'));
    });
  </script>
</body>
</html>
